<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>talk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    /*
     * Root font-size scales with the 16:9 stage so all rem-based typography
     * (content-slide headings, bullets, code, quotes, box-diagram, spacer)
     * fits the viewport automatically. 1rem = 16px at the canonical 1920px
     * stage width; smaller viewports scale down proportionally. The stage
     * itself is locked to 16:9 by #stage's max-width / max-height below, so
     * `min(100vw, 100vh * 16/9)` is the actual stage width.
     */
    :root {
      --ui-scale: 1;
      font-size: calc(min(100vw, 100vh * 16 / 9) / 120 * var(--ui-scale));
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
    }
    #stage {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: calc(100vh * 16 / 9);
      max-height: calc(100vw * 9 / 16);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
