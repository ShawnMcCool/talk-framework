<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="A stylized architecture diagram with a client connecting to an API and database">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1a35"/>
      <stop offset="100%" stop-color="#070b1c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2a55"/>
      <stop offset="100%" stop-color="#16204a"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>

  <!-- Background grid -->
  <g opacity="0.06" stroke="#aaccff" stroke-width="1">
    <path d="M0 80 H800 M0 160 H800 M0 240 H800 M0 320 H800 M0 400 H800"/>
    <path d="M100 0 V480 M200 0 V480 M300 0 V480 M400 0 V480 M500 0 V480 M600 0 V480 M700 0 V480"/>
  </g>

  <!-- Three nodes -->
  <g filter="url(#glow)">
    <rect x="80"  y="180" width="160" height="120" rx="14" fill="url(#card)" stroke="#aaccff" stroke-width="2"/>
    <rect x="320" y="180" width="160" height="120" rx="14" fill="url(#card)" stroke="#44bbff" stroke-width="2"/>
    <rect x="560" y="180" width="160" height="120" rx="14" fill="url(#card)" stroke="#ff9944" stroke-width="2"/>
  </g>

  <!-- Labels -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="middle">
    <text x="160" y="232" font-size="22" font-weight="600" fill="#e8e8f8">client</text>
    <text x="160" y="262" font-size="13" fill="#99aacc">browser / app</text>

    <text x="400" y="232" font-size="22" font-weight="600" fill="#e8e8f8">api</text>
    <text x="400" y="262" font-size="13" fill="#99aacc">stateless service</text>

    <text x="640" y="232" font-size="22" font-weight="600" fill="#e8e8f8">database</text>
    <text x="640" y="262" font-size="13" fill="#99aacc">postgres</text>
  </g>

  <!-- Arrows -->
  <g stroke="#aaccff" stroke-width="2" fill="none" opacity="0.85">
    <path d="M240 240 L320 240"/>
    <polygon points="320,240 308,234 308,246" fill="#aaccff"/>
    <path d="M480 240 L560 240"/>
    <polygon points="560,240 548,234 548,246" fill="#aaccff"/>
  </g>

  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#99aacc" text-anchor="middle">
    <text x="280" y="228">request</text>
    <text x="520" y="228">query</text>
  </g>

  <!-- Title -->
  <text x="400" y="64" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700" fill="#e8e8f8" text-anchor="middle">A simple system</text>
  <text x="400" y="92" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#99aacc" text-anchor="middle" letter-spacing="2">CLIENT  ·  API  ·  DATABASE</text>
</svg>
