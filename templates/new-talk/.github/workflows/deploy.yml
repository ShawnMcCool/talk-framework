name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout talk
        uses: actions/checkout@v4
        with:
          path: talk

      - name: Checkout talk-framework
        uses: actions/checkout@v4
        with:
          repository: ShawnMcCool/talk-framework
          ref: main
          path: framework

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install framework dependencies
        run: npm install
        working-directory: framework

      - name: Build
        run: npm run build
        working-directory: framework
        env:
          CONTENT_DIR: ${{ github.workspace }}/talk

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: framework/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
